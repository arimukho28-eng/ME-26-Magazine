<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPECTRUM - Mechanical Engineering Magazine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .premium-bg {
            background-color: #05070f;
        }
        .glass-card {
            background: rgba(20, 18, 42, 0.45);
            border: 1px solid rgba(139, 92, 246, 0.15);
            backdrop-filter: blur(14px);
        }
        .glass-nav {
            background: rgba(5, 7, 15, 0.75);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(139, 92, 246, 0.1);
        }
        .glow-text {
            text-shadow: 0 0 35px rgba(167, 139, 250, 0.5);
        }
        .hero-glow {
            background: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.15) 0%, rgba(0,0,0,0) 70%);
        }
    </style>
</head>
<body class="premium-bg text-gray-100 font-sans antialiased min-h-screen selection:bg-purple-500/30 pt-24 relative overflow-x-hidden">

    <canvas id="ambient-particles" class="fixed inset-0 pointer-events-none z-0 opacity-60"></canvas>

    <header class="fixed top-0 left-0 right-0 z-40 glass-nav transition-all duration-300">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <img src="KGEC_LOGO_w.png" alt="KGEC Logo" class="h-10 w-auto object-contain brightness-110">
                <div class="h-6 w-[1px] bg-purple-900/60"></div>
                <span class="font-black tracking-widest text-lg text-white glow-text select-none">SPECTRUM</span>
            </div>
            
            <div class="flex items-center space-x-3">
                <button id="faculty-modal-open" class="text-xs font-semibold tracking-widest uppercase text-slate-300 hover:text-white px-4 py-2.5 rounded-full hover:bg-purple-500/10 transition-all duration-200">
                    Faculty
                </button>

                <div class="relative inline-block text-left">
                    <button id="menu-button" class="flex items-center text-gray-400 hover:text-white p-2 rounded-full hover:bg-purple-500/10 transition-all focus:outline-none" aria-label="Options">
                        <svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" />
                        </svg>
                    </button>

                    <div id="dropdown-menu" class="hidden absolute right-0 mt-3 w-48 rounded-xl glass-card shadow-2xl ring-1 ring-black ring-opacity-5 focus:outline-none overflow-hidden origin-top-right transition-all duration-200 transform scale-95 opacity-0 z-50">
                        <div class="py-1 bg-[#090a14]/95" role="menu">
                            <a href="#" class="block px-4 py-3 text-sm text-gray-300 hover:bg-purple-600/20 hover:text-white transition-colors">Home</a>
                            <a href="#spirit" class="block px-4 py-3 text-sm text-gray-300 hover:bg-purple-600/20 hover:text-white transition-colors">The Spirit</a>
                            <a href="#administration" class="block px-4 py-3 text-sm text-gray-300 hover:bg-purple-600/20 hover:text-white transition-colors">Desk Messages</a>
                            <div class="border-t border-purple-950/40 my-1"></div>
                            <a href="#read-now" class="block px-4 py-3 text-sm text-purple-400 font-medium hover:bg-purple-600/20 hover:text-purple-300 transition-colors">Launch Flipbook</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div id="faculty-modal" class="hidden fixed inset-0 z-50 overflow-y-auto bg-black/70 backdrop-blur-md flex items-center justify-center p-4 md:p-6 transition-all duration-300 opacity-0">
        <div class="relative w-full max-w-5xl rounded-3xl glass-card max-h-[85vh] overflow-y-auto shadow-2xl shadow-purple-950/40 border border-purple-500/20 transform scale-95 transition-all duration-300">
            <div class="sticky top-0 z-10 bg-[#0c0e1a]/90 backdrop-blur-md px-8 py-5 border-b border-purple-950/60 flex justify-between items-center">
                <div>
                    <h3 class="text-xl font-bold text-white tracking-wide">Faculty Directory</h3>
                    <p class="text-xs text-purple-400/80 font-mono tracking-wider uppercase mt-0.5">Mechanical Engineering Department</p>
                </div>
                <button id="faculty-modal-close" class="p-2 rounded-full text-gray-400 hover:text-white hover:bg-purple-500/10 transition-colors focus:outline-none">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <div class="p-8 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-6">
                <div class="bg-[#0e101f] rounded-xl border border-purple-950/40 p-4 text-center space-y-3 group hover:border-purple-500/30 transition-all">
                    <div class="w-24 h-24 rounded-full bg-purple-950/40 border border-purple-900/30 mx-auto overflow-hidden flex items-center justify-center text-slate-500 font-mono text-[10px] group-hover:border-purple-500/30 transition-all">
                        [ IMAGE_01 ]
                    </div>
                    <div>
                        <h4 class="text-sm font-bold text-white truncate">Dr. Tridibesh Das</h4>
                        <p class="text-[11px] text-purple-400 font-medium">Professor & HOD</p>
                        <p class="text-[10px] text-slate-500 font-mono mt-1 truncate">Thermal Engineering</p>
                    </div>
                </div>

                <div class="bg-[#0e101f] rounded-xl border border-purple-950/40 p-4 text-center space-y-3 group hover:border-purple-500/30 transition-all">
                    <div class="w-24 h-24 rounded-full bg-purple-950/40 border border-purple-900/30 mx-auto overflow-hidden flex items-center justify-center text-slate-500 font-mono text-[10px] group-hover:border-purple-500/30 transition-all">
                        [ IMAGE_02 ]
                    </div>
                    <div>
                        <h4 class="text-sm font-bold text-white truncate">Dr. Santanu Das</h4>
                        <p class="text-[11px] text-purple-400 font-medium">Professor (Registrar)</p>
                        <p class="text-[10px] text-slate-500 font-mono mt-1 truncate">Machining & Tribology</p>
                    </div>
                </div>

                <div class="bg-[#0e101f] rounded-xl border border-purple-950/40 p-4 text-center space-y-3 group hover:border-purple-500/30 transition-all">
                    <div class="w-24 h-24 rounded
